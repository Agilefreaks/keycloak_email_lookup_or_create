# Build + test the jar locally without installing Maven/JDK:
#
#   docker compose run --rm build
#
# Runs the unit tests and produces target/keycloak-email-lookup-or-create.jar.
# The maven-cache volume persists ~/.m2 across runs so deps download once.
services:
  build:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /workspace
    volumes:
      - .:/workspace
      - maven-cache:/root/.m2
    command: mvn -B clean package

volumes:
  maven-cache:
